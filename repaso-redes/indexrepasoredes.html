            "DHCP sigue el proceso DORA: Discover, Offer, Request, Acknowledge.",
        },
        {
          enunciado: "¿Qué puerto utiliza Telnet?",
          opciones: ["21", "22", "23", "179"],
          correcta: 2,
          explicacion: "Telnet usa el puerto 23.",
        },
        {
          enunciado: "¿Qué puerto utiliza SSH?",
          opciones: ["20", "21", "22", "23"],
          correcta: 2,
          explicacion: "SSH usa el puerto 22.",
        },
        {
          enunciado: "¿Qué puerto utiliza FTP según el repaso?",
          opciones: ["21", "22", "23", "520"],
          correcta: 0,
          explicacion: "FTP usa el puerto 21.",
        },
        {
          enunciado: "¿Qué puerto utiliza SFTP según los apuntes?",
          opciones: ["21", "22", "23", "179"],
          correcta: 1,
          explicacion: "SFTP usa el puerto 22.",
        },
        {
          enunciado: "¿Qué secuencia representa el Three-Way Handshake de TCP?",
          opciones: [
            "Discover, Offer, Request",
            "SYN, SYN-ACK, ACK",
            "Echo Request, Echo Reply, ACK",
            "DNS, HTTP, TCP",
          ],
          correcta: 1,
          explicacion: "TCP establece conexión con SYN, SYN-ACK y ACK.",
        },
        {
          enunciado: "¿Qué protocolo se describe como ahí lo llevas?",
          opciones: ["TCP", "UDP", "DNS", "BGP"],
          correcta: 1,
          explicacion:
            "UDP se describe así porque no es orientado a conexión y no garantiza la entrega.",
        },
        {
          enunciado: "¿Cuál es una característica de UDP según el repaso?",
          opciones: [
            "Garantiza siempre la entrega",
            "Es orientado a conexión",
            "Tiene baja latencia",
            "Usa three-way handshake",
          ],
          correcta: 2,
          explicacion: "UDP tiene baja latencia, es rápido y poco fiable.",
        },
        {
          enunciado: "¿En qué capa trabaja UDP según los apuntes?",
          opciones: ["Capa 2", "Capa 3", "Capa 4", "Capa 7"],
          correcta: 2,
          explicacion: "UDP trabaja en la capa 4, Transporte.",
        },
        {
          enunciado: "¿Qué protocolo evita bucles entre switches?",
          opciones: ["VTP", "STP", "BGP", "DHCP"],
          correcta: 1,
          explicacion: "STP evita bucles entre switches.",
        },
        {
          enunciado: "¿Qué elemento principal elige STP?",
          opciones: [
            "Root Bridge",
            "Servidor DNS",
            "Gateway NAT",
            "Cliente DHCP",
          ],
          correcta: 0,
          explicacion: "STP elige un Root Bridge o switch principal.",
        },
        {
          enunciado: "¿Qué mensajes utiliza STP según el documento?",
          opciones: ["BPDU", "DORA", "SYN", "MX"],
          correcta: 0,
          explicacion: "STP utiliza mensajes BPDU.",
        },
        {
          enunciado: "¿Qué versión rápida de STP aparece en los apuntes?",
          opciones: ["RSTP 802.1w", "OSPF 89", "dot1Q", "WPA3"],
          correcta: 0,
          explicacion: "RSTP aparece como 802.1w.",
        },
        {
          enunciado: "¿Para qué sirve VTP?",
          opciones: [
            "Para evitar bucles físicos",
            "Para crear VLANs automáticas entre switches",
            "Para traducir IP pública y privada",
            "Para comprobar errores de bits",
          ],
          correcta: 1,
          explicacion: "VTP permite crear VLANs automáticas entre switches.",
        },
        {
          enunciado: "¿Cuáles son modos de VTP mencionados?",
          opciones: [
            "Root, Backup y Forward",
            "Server, Client y Transparent",
            "Discover, Offer y Request",
            "SYN, ACK y FIN",
          ],
          correcta: 1,
          explicacion:
            "Los modos de VTP mencionados son Server, Client y Transparent.",
        },
        {
          enunciado: "¿Qué hacen NAT/PAT según el repaso?",
          opciones: [
            "Cifran la red Wi-Fi",
            "Traducen entre IP pública e IP privada",
            "Evitan bucles de switches",
            "Calculan CRC en la trama",
          ],
          correcta: 1,
          explicacion: "NAT/PAT traducen entre IP pública e IP privada.",
        },
        {
          enunciado: "¿Cuántos puertos posibles se indican para NAT/PAT?",
          opciones: ["1024", "4096", "32768", "65536"],
          correcta: 3,
          explicacion: "El repaso indica 2^16 puertos, es decir, 65536.",
        },
        {
          enunciado: "¿Cuál de estos comandos aparece en el repaso?",
          opciones: ["chmod", "ping", "mkdir", "nano"],
          correcta: 1,
          explicacion:
            "El documento menciona ping, tracert, ipconfig y netstat.",
        },
        {
          enunciado: "¿Qué herramienta se usa para verificar cableado RJ45?",
          opciones: ["Tester de red", "OTDR", "Fusionadora", "Puntero láser"],
          correcta: 0,
          explicacion: "El tester de red sirve para verificar cableado RJ45.",
        },
        {
          enunciado: "¿Qué herramienta se utiliza para comprobar fibra óptica?",
          opciones: ["Crimpadora", "OTDR", "Pelacables", "Multímetro"],
          correcta: 1,
          explicacion: "El OTDR se usa como tester de fibra.",
        },
        {
          enunciado:
            "¿Cuántas subredes se obtienen al dividir 192.168.1.0/24 en /26?",
          opciones: ["2", "4", "6", "8"],
          correcta: 1,
          explicacion:
            "De /24 a /26 se toman 2 bits para subredes: 2² = 4 subredes.",
        },
        {
          enunciado: "¿Cuántos hosts útiles por subred hay en una red /27?",
          opciones: ["16", "32", "30", "62"],
          correcta: 2,
          explicacion:
            "Una red /27 tiene 32 direcciones totales; quitando red y broadcast quedan 30 hosts útiles.",
        },
      ];

      const TOTAL_PREGUNTAS = Math.min(30, preguntas.length);

      function mezclarArray(lista) {
        const copia = [...lista];
        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
      }

      function obtenerTestAleatorio() {
        return mezclarArray(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      const SUBJECT_NAME = "Repaso Redes";

      function TestInteractivo() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() =>
          obtenerTestAleatorio(),
        );

        const [respuestas, setRespuestas] = React.useState(() =>
          Array(TOTAL_PREGUNTAS).fill(null),
        );

        const [corregido, setCorregido] = React.useState(false);

        const respondidas = respuestas.filter((r) => r !== null).length;

        const aciertos = respuestas.reduce(
          (acc, r, i) =>
            r !== null && r === preguntasMostradas[i]?.correcta ? acc + 1 : acc,
          0,
        );

        const fallos = respuestas.reduce(
          (acc, r, i) =>
            r !== null && r !== preguntasMostradas[i]?.correcta ? acc + 1 : acc,
          0,
        );

        const enBlanco = preguntasMostradas.length - respondidas;

        const puntaje = (aciertos * 0.33 - fallos * 0.11).toFixed(2);

        const puntuacionMaxima = preguntasMostradas.length * 0.33;

        const porcentaje = puntuacionMaxima
          ? Math.max(0, Math.round((Number(puntaje) / puntuacionMaxima) * 100))
          : 0;

        const seleccionar = (pIndex, rIndex) => {
          if (corregido) return;
          const copia = [...respuestas];
          copia[pIndex] = rIndex;
          setRespuestas(copia);
        };

        const corregirTest = () => {
          if (
            window.ErrorLab &&
            typeof window.ErrorLab.recordFailures === "function"
          ) {
            window.ErrorLab.recordFailures(
              SUBJECT_NAME,
              preguntasMostradas,
              respuestas,
            );
          }
          setCorregido(true);
        };

        const reiniciar = () => {
          const nuevoTest = obtenerTestAleatorio();
          setPreguntasMostradas(nuevoTest);
          setRespuestas(Array(nuevoTest.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link back-link-final">
                  <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                </a>
              </div>

              <section className="hero" style={{ padding: "28px 24px" }}>
                <span className="badge">
                  🌐 Planificación y Administración de Redes
                </span>

                <h1 className="test-title">Repaso Redes</h1>

                <p className="lead">
                  Test interactivo autocorregible con 30 preguntas aleatorias
                  por intento. Al reiniciar, el sistema vuelve a barajar y
                  genera un test distinto.
                </p>

                <p
                  className="lead"
                  style={{ marginTop: "10px", fontSize: "0.98rem" }}
                >
                  Sistema de puntuación: correcta +0,33, incorrecta -0,11, en
                  blanco 0.
                </p>

                <div className="stats">
                  <div className="stat">
                    <b>{preguntasMostradas.length}</b>Preguntas
                  </div>

                  <div className="stat">
                    <b>{respondidas}</b>Respondidas
                  </div>

                  <div className="stat">
                    <b>{corregido ? puntaje : "—"}</b>Puntos
                  </div>
                </div>
              </section>

              <div style={{ height: "18px" }} />

              {preguntasMostradas.map((p, i) => (
                <div
                  key={i}
                  className={`card${corregido && respuestas[i] === null ? " card-blank" : ""}`}
                >
                  <h2 className="question-title">
                    {i + 1}. {p.enunciado}
                  </h2>

                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;

                    let clases = "answer-btn";

                    if (seleccionado) clases += " answer-selected";

                    if (
                      corregido &&
                      respuestas[i] !== null &&
                      seleccionado &&
                      !esCorrecta
                    ) {
                      clases += " answer-wrong";
                    }

                    if (corregido && respuestas[i] !== null && esCorrecta) {
                      clases += " answer-correct";
                    }

                    if (corregido && respuestas[i] === null && esCorrecta) {
                      clases += " answer-correct";
                    }

                    return (
                      <button
                        key={j}
                        onClick={() => seleccionar(i, j)}
                        className={clases}
                      >
                        {op}
                      </button>
                    );
                  })}

                  {corregido && (
                    <div
                      style={{
                        marginTop: "14px",
                        padding: "12px 14px",
                        borderRadius: "14px",
                        background: "rgba(20, 184, 166, 0.10)",
                        border: "1px solid rgba(20, 184, 166, 0.25)",
                        fontSize: "0.95rem",
                        lineHeight: "1.5",
                      }}
                    >
                      <strong>Respuesta correcta:</strong>{" "}
                      {String.fromCharCode(65 + p.correcta)}){" "}
                      {p.opciones[p.correcta]}
                      <br />
                      <strong>Explicación:</strong> {p.explicacion}
                    </div>
                  )}
                </div>
              ))}

              <div className="result-section">
                <div className="actions">
                  <a href="../index.html" className="back-link back-link-final">
                    <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                  </a>

                  <button className="btn-correct" onClick={corregirTest}>
                    Corregir test
                  </button>

                  <button className="btn-reset" onClick={reiniciar}>
                    Reiniciar
                  </button>
                </div>

                {corregido && (
                  <>
                    <p className="result-text">Puntuación: {puntaje} puntos</p>

                    <p className="result-sub">
                      {aciertos} correctas, {fallos} incorrectas y {enBlanco} en
                      blanco.
                    </p>

                    <div className="progress">
                      <span style={{ width: `${porcentaje}%` }}></span>
                    </div>
                  </>
                )}
              </div>

              <footer>
                Creado a partir de tus preguntas de repaso y preparado para
                publicación en GitHub Pages.
              </footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <TestInteractivo />,
      );
    </script>
  </body>
</html>
