<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="28" fill="#1f1b3a"/>
  <rect x="10" y="10" width="108" height="108" rx="22" fill="none" stroke="url(#g)" stroke-width="3.5" opacity="0.95"/>
  <circle cx="64" cy="44" r="20" fill="url(#g)" opacity="0.18"/>
  <text x="64" y="49" text-anchor="middle" font-size="22" font-family="Inter, Arial, sans-serif" fill="url(#g)" filter="url(#glow)">✳</text>
  <text x="64" y="88" text-anchor="middle" font-size="28" font-weight="700" letter-spacing="1" font-family="Inter, Arial, sans-serif" fill="#f8fffd">IP</text>
