            "Gestiona los certificados SSL de todos los balanceadores de carga de la cuenta.",
            "Entrega el contenido desde ubicaciones edge cercanas al usuario final.",
          ],
          correcta: 3,
        },
        {
          enunciado:
            "Una empresa quiere evaluar si su arquitectura en AWS sigue las mejores prácticas en términos de seguridad, costes y resiliencia. ¿Qué herramienta de AWS utiliza para ello?",
          opciones: [
            "AWS Pricing Calculator, para estimar el coste mensual de los servicios.",
            "AWS CloudFormation, para desplegar la infraestructura como código.",
            "AWS Well-Architected Tool, basada en el Well-Architected Framework.",
            "Amazon CloudWatch, para monitorizar métricas y crear alertas.",
          ],
          correcta: 2,
        },
        {
          enunciado: "¿Qué ventaja clave aporta una CDN?",
          opciones: [
            "Más almacenamiento.",
            "Más bases de datos.",
            "Más permisos.",
            "Menor latencia al usuario.",
          ],
          correcta: 3,
        },
        {
          enunciado:
            "¿Qué criterio tiene más sentido usar para repartir tráfico global mediante DNS?",
          opciones: [
            "La hora del servidor.",
            "El tamaño de la instancia.",
            "El coste de la región.",
            "La ubicación del usuario.",
          ],
          correcta: 3,
        },
        {
          enunciado: "¿Qué es AWS CloudFront y qué ventajas nos ofrece?",
          opciones: [
            "Un servicio para crear usuarios IAM con privilegios de administrador.",
            "Un tipo de volumen EBS magnético.",
            "Una red de entrega de contenido que usa cachés distribuidas para entregar contenido desde ubicaciones cercanas al usuario, reduciendo latencia y mejorando rendimiento y escalado.",
            "Un motor de base de datos relacional compatible con MySQL.",
          ],
          correcta: 2,
        },
        // ── Extra (estaban en el HTML original) ────────────────────────────
        {
          enunciado:
            "¿Qué es una región en AWS y cuál es la diferencia entre una región y una Availability Zone?",
          opciones: [
            "Una región es una ubicación geográfica con varias zonas de disponibilidad; una Availability Zone es una ubicación aislada dentro de esa región.",
            "Una región es un único centro de datos y una Availability Zone es un país completo.",
            "Una región solo se usa para facturación y una Availability Zone solo se usa para IAM.",
            "Una región y una Availability Zone son exactamente lo mismo.",
          ],
          correcta: 0,
        },
        {
          enunciado:
            "¿Qué criterios me van a llevar a decidir elegir una región u otra?",
          opciones: [
            "Solo el nombre de la región en la consola.",
            "Únicamente el color asignado a los recursos en AWS.",
            "Latencia/proximidad a usuarios, cumplimiento normativo o residencia de datos, disponibilidad de servicios y costes.",
            "Solo la cantidad de usuarios IAM creados en la cuenta.",
          ],
          correcta: 2,
        },
        {
          enunciado:
            "¿Qué tres factores son los fundamentales para determinar el coste de AWS?",
          opciones: [
            "Número de usuarios de LinkedIn, número de regiones y número de certificados.",
            "Sistema operativo, navegador web y editor de texto.",
            "IAM, grupos de seguridad y ACL de red.",
            "Cómputo, almacenamiento y transferencia de datos saliente.",
          ],
          correcta: 3,
        },
        {
          enunciado: "¿Qué es EC2 y qué es S3?",
          opciones: [
            "EC2 es un servicio de bases de datos relacionales y S3 es un servicio de DNS.",
            "EC2 permite ejecutar instancias/servidores virtuales; S3 es almacenamiento de objetos en buckets.",
            "EC2 es un servicio de correo electrónico y S3 es un balanceador de carga.",
            "EC2 y S3 son únicamente herramientas de facturación.",
          ],
          correcta: 1,
        },
        {
          enunciado:
            "¿Qué es una política de IAM y en qué formato están escritas?",
          opciones: [
            "Un documento que define a qué recursos se puede acceder y el nivel de acceso; se escribe en formato JSON.",
            "Una imagen de máquina utilizada para lanzar instancias EC2; se escribe en YAML obligatorio.",
            "Un firewall de subred; se escribe en binario.",
            "Un bucket de almacenamiento; se escribe en CSV.",
          ],
          correcta: 0,
        },
      ];

      const TOTAL_PREGUNTAS = Math.min(30, preguntas.length);

      function mezclarArray(lista) {
        const copia = [...lista];

        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }

        return copia;
      }

      function obtenerTestAleatorio() {
        return mezclarArray(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      const SUBJECT_NAME = "Fundamentos de Computación en la Nube";

      function TestInteractivo() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() =>
          obtenerTestAleatorio(),
        );

        const [respuestas, setRespuestas] = React.useState(() =>
          Array(TOTAL_PREGUNTAS).fill(null),
        );

        const [corregido, setCorregido] = React.useState(false);

        const respondidas = respuestas.filter((r) => r !== null).length;
        const aciertos = respuestas.reduce(
          (acc, r, i) =>
            r !== null && r === preguntasMostradas[i]?.correcta ? acc + 1 : acc,
          0,
        );
        const fallos = respuestas.reduce(
          (acc, r, i) =>
            r !== null && r !== preguntasMostradas[i]?.correcta ? acc + 1 : acc,
          0,
        );
        const enBlanco = preguntasMostradas.length - respondidas;
        const puntaje = (aciertos * 0.33 - fallos * 0.11).toFixed(2);
        const puntuacionMaxima = preguntasMostradas.length * 0.33;
        const porcentaje = puntuacionMaxima
          ? Math.max(0, Math.round((Number(puntaje) / puntuacionMaxima) * 100))
          : 0;

        const seleccionar = (pIndex, rIndex) => {
          const copia = [...respuestas];
          copia[pIndex] = rIndex;
          setRespuestas(copia);
        };

        const corregirTest = () => {
          window.ErrorLab.recordFailures(
            SUBJECT_NAME,
            preguntasMostradas,
            respuestas,
          );
          setCorregido(true);
        };

        const reiniciar = () => {
          const nuevoTest = obtenerTestAleatorio();
          setPreguntasMostradas(nuevoTest);
          setRespuestas(Array(nuevoTest.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link back-link-final">
                  <span className="neon-arrow">←</span> Volver al portal
                </a>
              </div>
              <section className="hero" style={{ padding: "28px 24px" }}>
                <span className="badge">
                  ☁️ Fundamentos de Computación en la Nube
                </span>

                <h1 className="test-title">
                  Fundamentos de Computación en la Nube
                </h1>

                <p className="lead">
                  Test interactivo autocorregible con preguntas aleatorias por
                  intento. Al reiniciar, el sistema vuelve a barajar y genera un
                  test distinto.
                </p>

                <p
                  className="lead"
                  style={{ marginTop: "10px", fontSize: "0.98rem" }}
                >
                  Sistema de puntuación: correcta +0,33, incorrecta -0,11, en
                  blanco 0.
                </p>

                <div className="stats">
                  <div className="stat">
                    <b>{preguntasMostradas.length}</b>Preguntas
                  </div>

                  <div className="stat">
                    <b>{respondidas}</b>Respondidas
                  </div>

                  <div className="stat">
                    <b>{corregido ? puntaje : "—"}</b>Puntos
                  </div>
                </div>
              </section>

              <div style={{ height: "18px" }} />

              {preguntasMostradas.map((p, i) => (
                <div
                  key={i}
                  className={`card${corregido && respuestas[i] === null ? " card-blank" : ""}`}
                >
                  <h2 className="question-title">
                    {i + 1}. {p.enunciado}
                  </h2>

                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;
                    let clases = "answer-btn";

                    if (seleccionado) clases += " answer-selected";

                    if (corregido && seleccionado && !esCorrecta) {
                      clases += " answer-wrong";
                    }

                    if (corregido && esCorrecta) {
                      clases += " answer-correct";
                    }

                    return (
                      <button
                        key={j}
                        onClick={() => seleccionar(i, j)}
                        className={clases}
                      >
                        {op}
                      </button>
                    );
                  })}
                </div>
              ))}

              <div className="result-section">
                <div className="actions">
                  <a href="../index.html" className="back-link back-link-final">
                    <span className="neon-arrow">←</span> Volver al portal
                  </a>
                  <button className="btn-correct" onClick={corregirTest}>
                    Corregir test
                  </button>

                  <button className="btn-reset" onClick={reiniciar}>
                    Reiniciar
                  </button>
                </div>

                {corregido && (
                  <>
                    <p className="result-text">Puntuación: {puntaje} puntos</p>

                    <p className="result-sub">
                      {aciertos} correctas, {fallos} incorrectas y {enBlanco} en
                      blanco.
                    </p>

                    <div className="progress">
                      <span style={{ width: `${porcentaje}%` }}></span>
                    </div>
                  </>
                )}
              </div>

              <footer>
                Creado a partir de tus preguntas y preparado para publicación en
                GitHub Pages.
              </footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <TestInteractivo />,
      );
    </script>
  </body>
</html>
