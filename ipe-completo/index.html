      const TOTAL_PREGUNTAS = Math.min(30, preguntas.length);
      let preguntasMostradas = [];
      let respuestas = [];
      let corregido = false;

      function mezclarArray(lista) {
        const copia = [...lista];
        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
      }

      function obtenerTestAleatorio() {
        return mezclarArray(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      function iniciarTest() {
        preguntasMostradas = obtenerTestAleatorio();
        respuestas = Array(preguntasMostradas.length).fill(null);
        corregido = false;
        renderizar();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function seleccionar(pIndex, rIndex) {
        respuestas[pIndex] = rIndex;
        renderizar();
      }

      function corregirTest() {
        corregido = true;
        renderizar();
      }

      function escapeHTML(valor) {
        return String(valor)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderizar() {
        const root = document.getElementById("root");
        const respondidas = respuestas.filter((r) => r !== null).length;
        const puntaje = respuestas.reduce((acc, r, i) => r === preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const porcentaje = preguntasMostradas.length ? Math.round((puntaje / preguntasMostradas.length) * 100) : 0;

        const tarjetas = preguntasMostradas.map((p, i) => {
          const botones = p.opciones.map((op, j) => {
            const seleccionado = respuestas[i] === j;
            const esCorrecta = p.correcta === j;
            let clases = "answer-btn";
            if (seleccionado) clases += " answer-selected";
            if (corregido && seleccionado && !esCorrecta) clases += " answer-wrong";
            if (corregido && esCorrecta) clases += " answer-correct";
            return `<button class="${clases}" onclick="seleccionar(${i}, ${j})">${escapeHTML(op)}</button>`;
          }).join("");
          return `<div class="card"><h2 class="question-title">${i + 1}. ${escapeHTML(p.enunciado)}</h2>${botones}</div>`;
        }).join("");

        root.innerHTML = `
          <div class="page-shell">
            <div class="test-container">
              <div class="topbar"><a href="../index.html" class="back-link">← Volver al portal</a></div>
              <section class="hero" style="padding: 28px 24px">
                <span class="badge">📚 Itinerario Personal para la Empleabilidad</span>
                <h1 class="test-title">IPE Completo</h1>
                <p class="lead">Test interactivo autocorregible con 30 preguntas aleatorias por intento. Banco completo: ${preguntas.length} preguntas.</p>
                <div class="stats">
                  <div class="stat"><b>${preguntasMostradas.length}</b>Preguntas</div>
                  <div class="stat"><b>${respondidas}</b>Respondidas</div>
                  <div class="stat"><b>${corregido ? puntaje : "—"}</b>Aciertos</div>
                </div>
              </section>
              <div style="height: 18px"></div>
              ${tarjetas}
              <div class="result-section">
                <div class="actions">
                  <button class="btn-correct" onclick="corregirTest()">Corregir test</button>
                  <button class="btn-reset" onclick="iniciarTest()">Reiniciar</button>
                </div>
                ${corregido ? `<p class="result-text">Resultado: ${puntaje} / ${preguntasMostradas.length} (${porcentaje}%)</p><p class="result-sub">Has respondido ${respondidas} de ${preguntasMostradas.length} preguntas.</p><div class="progress"><span style="width: ${porcentaje}%"></span></div>` : ""}
              </div>
              <footer>Banco completo de preguntas preparado para publicación en GitHub Pages.</footer>
            </div>
          </div>`;
      }

      iniciarTest();
    </script>
