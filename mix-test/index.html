<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Mix Test · Test Interactivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <script src="../assets/error-lab.js"></script>
    <script src="../assets/mix-test-data.js"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/favicons/portal.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const TOTAL_PREGUNTAS = 30;
      const bank = Array.isArray(window.MIX_TEST_BANK) ? window.MIX_TEST_BANK : [];

      function shuffle(list) {
        const copy = [...list];
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function buildRound() {
        const bySubject = {};
        for (const q of bank) {
          (bySubject[q.asignatura] ??= []).push(q);
        }
        const subjects = shuffle(Object.keys(bySubject));
        const selected = [];
        const used = new Set();

        // one from each subject first
        for (const s of subjects) {
          const candidate = shuffle(bySubject[s]).find(q => !used.has(q.enunciado));
          if (candidate && selected.length < TOTAL_PREGUNTAS) {
            selected.push(candidate);
            used.add(candidate.enunciado);
          }
        }
        // fill remainder
        const rest = shuffle(bank).filter(q => !used.has(q.enunciado));
        while (selected.length < Math.min(TOTAL_PREGUNTAS, bank.length) && rest.length) {
          const q = rest.shift();
          selected.push(q);
          used.add(q.enunciado);
        }
        return shuffle(selected);
      }

      const SUBJECT_NAME = 'Mix Test';

      function MixTest() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() => buildRound());
        const [respuestas, setRespuestas] = React.useState(() => Array(TOTAL_PREGUNTAS).fill(null));
        const [corregido, setCorregido] = React.useState(false);

        const respondidas = respuestas.filter(r => r !== null).length;
        const aciertos = respuestas.reduce((acc, r, i) =>
          r !== null && r === preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const fallos = respuestas.reduce((acc, r, i) =>
          r !== null && r !== preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const enBlanco = preguntasMostradas.length - respondidas;
        const puntaje = ((aciertos * 0.33) - (fallos * 0.11)).toFixed(2);
        const puntuacionMaxima = preguntasMostradas.length * 0.33;
        const porcentaje = puntuacionMaxima
          ? Math.max(0, Math.round((Number(puntaje) / puntuacionMaxima) * 100)) : 0;

        const seleccionar = (pIndex, rIndex) => {
          if (corregido) return;
          const copia = [...respuestas];
          copia[pIndex] = rIndex;
          setRespuestas(copia);
        };

        const corregirTest = () => {
          if (window.ErrorLab && typeof window.ErrorLab.recordFailures === 'function') {
            window.ErrorLab.recordFailures(SUBJECT_NAME, preguntasMostradas, respuestas);
          }
          setCorregido(true);
        };

        const reiniciar = () => {
          const nuevo = buildRound();
          setPreguntasMostradas(nuevo);
          setRespuestas(Array(nuevo.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link back-link-final">
                  <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                </a>
              </div>

              <section className="hero" style={{ padding: '28px 24px' }}>
                <span className="badge">🎲 Mix Test</span>
                <h1 className="test-title">Mix Test</h1>
                <p className="lead">
                  30 preguntas tipo test aleatorias mezcladas de todas las asignaturas.
                  Cada intento genera un examen distinto con preguntas de todo el banco.
                </p>
                <p className="lead" style={{ marginTop: '10px', fontSize: '0.98rem' }}>
                  Sistema de puntuación: correcta +0,33, incorrecta −0,11, en blanco 0.
                </p>
                <div className="stats">
                  <div className="stat"><b>{preguntasMostradas.length}</b>Preguntas</div>
                  <div className="stat"><b>{respondidas}</b>Respondidas</div>
                  <div className="stat"><b>{corregido ? puntaje : '—'}</b>Puntos</div>
                </div>
              </section>

              <div style={{ height: '18px' }} />

              {preguntasMostradas.map((p, i) => (
                <div key={i} className={`card${corregido && respuestas[i] === null ? ' card-blank' : ''}`}>
                  <h2 className="question-title">
                    {i + 1}. <span style={{ opacity: 0.5, fontSize: '0.85em' }}>[{p.asignatura}]</span> {p.enunciado}
                  </h2>
                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;
                    let clases = 'answer-btn';
                    if (seleccionado) clases += ' answer-selected';
                    if (corregido && respuestas[i] !== null && seleccionado && !esCorrecta) clases += ' answer-wrong';
                    if (corregido && respuestas[i] !== null && esCorrecta) clases += ' answer-correct';
                    return (
                      <button key={j} onClick={() => seleccionar(i, j)} className={clases}>{op}</button>
                    );
                  })}
                </div>
              ))}

              <div className="result-section">
                <div className="actions">
                  <a href="../index.html" className="back-link back-link-final">
                    <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                  </a>
                  <button className="btn-correct" onClick={corregirTest}>Corregir test</button>
                  <button className="btn-reset" onClick={reiniciar}>Reiniciar</button>
                </div>
                {corregido && (
                  <>
                    <p className="result-text">Puntuación: {puntaje} puntos</p>
                    <p className="result-sub">{aciertos} correctas, {fallos} incorrectas y {enBlanco} en blanco.</p>
                    <div className="progress"><span style={{ width: `${porcentaje}%` }}></span></div>
                  </>
                )}
              </div>
              <footer>Banco combinado de todas las asignaturas del proyecto.</footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<MixTest />);
    </script>
  </body>
</html>
