          ],
          correcta: 2,

        {
          enunciado: "La 3ª Forma Normal (3FN) elimina:",
          opciones: [
            "Dependencias parciales",
            "Dependencias transitivas",
            "Valores atómicos",
            "PK compuestas",
          ],
          correcta: 1,
        },
        {
          enunciado: "Una dependencia transitiva ocurre cuando:",
          opciones: [
            "Un atributo depende de la PK",
            "Un atributo depende de otro no clave",
            "Hay FK",
            "Hay una N:M",
          ],
          correcta: 1,

        {

          ],

          ],

          ],

        {

            "Minimizar tablas",
          ],
          correcta: 1,
        },
        {
          enunciado:
            "¿Por qué los sistemas basados en archivos tradicionales generaban problemas en la gestión de la información?",
          opciones: [

            "Porque impedían el acceso a los datos",
            "Porque producían redundancia y falta de coherencia entre los datos",
            "Porque no permitían almacenar información",
          ],
          correcta: 2,
        },
        {
          enunciado:
            "¿Cuál es la principal función de un Sistema Gestor de Bases de Datos (SGBD)?",
          opciones: [

            "Actuar como intermediario entre usuarios y datos, gestionando su almacenamiento y acceso",
            "Crear sistemas operativos",
            "Eliminar información automáticamente",
          ],
          correcta: 1,
        },
        {
          enunciado:
            "En el diseño de bases de datos, ¿por qué es importante separar los datos de las aplicaciones que los utilizan?",
          opciones: [
            "Para reducir el tamaño del software",
            "Para mejorar la independencia y facilitar cambios sin afectar a las aplicaciones",
            "Para eliminar el uso de SQL",
            "Para evitar errores de compilación",
          ],
          correcta: 1,
        },
        {
          enunciado:
            "En un modelo Entidad-Relación, ¿qué representa una entidad y por qué es fundamental en el diseño?",
          opciones: [
            "Un tipo de dato",
            "Un objeto del mundo real sobre el que queremos almacenar información",
            "Una relación entre tablas",
            "Un atributo",
          ],
          correcta: 1,
        },
        {
          enunciado:
            "¿Qué diferencia existe entre una entidad y un atributo dentro de un modelo E-R?",
          opciones: [

        },
        {

          ],
          correcta: 1,
        },
        {
          enunciado:
            "¿Por qué la clave primaria es un elemento fundamental en una tabla?",
          opciones: [
            "Para reducir el tamaño",
            "Porque identifica de forma única cada registro",
            "Porque elimina errores automáticamente",
            "Porque mejora el diseño visual",
          ],
          correcta: 1,
        },
        {
          enunciado:
            "¿Qué papel desempeñan las claves foráneas en una base de datos relacional?",

            "Validar código",
          ],
          correcta: 1,

        {

        {

          ],

            "Claves",
          ],
          correcta: 1,
        },
        {
          enunciado:

          opciones: [
            "Dependencias directas",
            "Dependencias indirectas entre atributos no clave",
            "Claves",
            "Relaciones",
          ],
          correcta: 1,
        },
        {
          enunciado: "¿Qué tipo de lenguaje es SQL y qué implica esto?",

          correcta: 1,

        {
          enunciado: "¿Qué diferencia hay entre DDL y DML en SQL?",
          opciones: [
            "Ninguna",
            "DDL define estructura y DML manipula datos",
            "DML crea tablas",
            "DDL elimina datos",
          ],
          correcta: 1,
        },
        {
          enunciado:

          opciones: [

            "Para compilar",
            "Para ejecutar",
          ],
          correcta: 1,

          opciones: [

            "Campo obligatorio",
            "Relación",
            "Eliminación",
          ],
          correcta: 1,
        },
        {
          enunciado: "¿Por qué UNIQUE evita errores en una base de datos?",
          opciones: [
            "Porque elimina datos",
            "Porque evita duplicados",
            "Porque crea tablas",
            "Porque valida código",
          ],
          correcta: 1,
        },
        {
          enunciado: "¿Qué función tiene la restricción CHECK en SQL?",
          opciones: [
            "Validar reglas o condiciones sobre los datos",
            "Crear tablas",
            "Eliminar datos",
            "Insertar datos",
          ],
          correcta: 0,
        },
        {
          enunciado: "¿Qué representa una fila dentro de una tabla relacional?",
          opciones: ["Columna", "Registro", "Tabla", "Clave"],
          correcta: 1,
        },];
      const TOTAL_PREGUNTAS = Math.min(30, preguntas.length);

      function mezclarArray(lista) {
        const copia = [...lista];
        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
      }

      function obtenerTestAleatorio() {
        return mezclarArray(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      function TestInteractivo() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() => obtenerTestAleatorio());
        const [respuestas, setRespuestas] = React.useState(() => Array(TOTAL_PREGUNTAS).fill(null));
        const [corregido, setCorregido] = React.useState(false);
        const respondidas = respuestas.filter((r) => r !== null).length;
        const puntaje = respuestas.reduce((acc, r, i) => r === preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const porcentaje = preguntasMostradas.length ? Math.round((puntaje / preguntasMostradas.length) * 100) : 0;
        const seleccionar = (pIndex, rIndex) => {
          const copia = [...respuestas];
          copia[pIndex] = rIndex;
          setRespuestas(copia);
        };
        const reiniciar = () => {
          const nuevoTest = obtenerTestAleatorio();
          setPreguntasMostradas(nuevoTest);
          setRespuestas(Array(nuevoTest.length).fill(null));
          setCorregido(false);
          window.scrollTo({top:0, behavior:'smooth'});
        };
        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link">← Volver al portal</a>
              </div>
              <section className="hero" style={{padding:'28px 24px'}}>
                <span className="badge">🗄️ Bases de Datos</span>
                <h1 className="test-title">Bases de Datos</h1>
                <p className="lead">Test interactivo autocorregible con 30 preguntas aleatorias por intento. Al reiniciar, el sistema vuelve a barajar y genera un test distinto.</p>
                <div className="stats">
                  <div className="stat"><b>{preguntasMostradas.length}</b>Preguntas</div>
                  <div className="stat"><b>{respondidas}</b>Respondidas</div>
                  <div className="stat"><b>{corregido ? puntaje : '—'}</b>Aciertos</div>
                </div>
              </section>
              <div style={{height:'18px'}} />
              {preguntasMostradas.map((p, i) => (
                <div key={i} className="card">
                  <h2 className="question-title">{i + 1}. {p.enunciado}</h2>
                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;
                    let clases = 'answer-btn';
                    if (seleccionado) clases += ' answer-selected';
                    if (corregido && seleccionado && !esCorrecta) clases += ' answer-wrong';
                    if (corregido && esCorrecta) clases += ' answer-correct';
                    return (
                      <button key={j} onClick={() => seleccionar(i, j)} className={clases}>
                        {op}
                      </button>
                    );
                  })}
                </div>
              ))}
              <div className="result-section">
                <div className="actions">
                  <button className="btn-correct" onClick={() => setCorregido(true)}>Corregir test</button>
                  <button className="btn-reset" onClick={reiniciar}>Reiniciar</button>
                </div>
                {corregido && (
                  <>
                    <p className="result-text">Resultado: {puntaje} / {preguntasMostradas.length} ({porcentaje}%)</p>
                    <p className="result-sub">Has respondido {respondidas} de {preguntasMostradas.length} preguntas.</p>
                    <div className="progress"><span style={{width: `${porcentaje}%`}}></span></div>
                  </>
                )}
              </div>
              <footer>Creado a partir de tus preguntas y preparado para publicación en GitHub Pages.</footer>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<TestInteractivo />);
    </script>
  </body>
</html>
