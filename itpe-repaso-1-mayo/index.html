        {

        {

        {

          opciones: [
            "Régimen General",

          ],

        },
        {

        },
        {
          enunciado: "¿Qué estrategia debe seguirse cuando se busca trabajo?",
          opciones: [

            "Rellenar el currículum con toda tu experiencia ordenada de más moderna a más antigua",
            "Organizar tu currículum según tu experiencia de más antigua a más moderna",
            "Personalizar el currículum a cada oferta de trabajo",
          ],
          correcta: 3,
        },
        {
          enunciado:
            "¿Qué nivel educativo se encuentra entre la formación profesional de grado básico y la de grado superior?",
          opciones: [
            "Formación Profesional I",
            "Formación Profesional II",
            "Ciclo Formativo de Grado Medio",
            "Ciclo Formativo de Grado Elemental",
          ],
          correcta: 2,
        },
        {
          enunciado:
            "¿Cuál es el máximo grupo al que puede pertenecer un funcionario?",
          opciones: ["Grupo A", "Grupo B", "Grupo C", "Grupo D"],
          correcta: 0,
        },
      ];

      const TOTAL_PREGUNTAS = 30;

      function mezclarArray(array) {
        const copia = [...array];
        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
      }

      function obtenerTestAleatorio() {
        return mezclarArray(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      const SUBJECT_NAME = "ITPE Repaso 1 de Mayo";

      function TestInteractivo() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() =>
          obtenerTestAleatorio(),
        );
        const [respuestas, setRespuestas] = React.useState(() =>
          Array(TOTAL_PREGUNTAS).fill(null),
        );
        const [corregido, setCorregido] = React.useState(false);

        const respondidas = respuestas.filter((r) => r !== null).length;
        const aciertos = respuestas.reduce(
          (acc, r, i) =>
            r !== null && r === preguntasMostradas[i]?.correcta ? acc + 1 : acc,
          0,
        );
        const fallos = respuestas.reduce(
          (acc, r, i) =>
            r !== null && r !== preguntasMostradas[i]?.correcta ? acc + 1 : acc,
          0,
        );
        const enBlanco = preguntasMostradas.length - respondidas;
        const puntaje = (aciertos * 0.33 - fallos * 0.11).toFixed(2);
        const puntuacionMaxima = preguntasMostradas.length * 0.33;
        const porcentaje = puntuacionMaxima
          ? Math.max(0, Math.round((Number(puntaje) / puntuacionMaxima) * 100))
          : 0;

        const seleccionar = (pIndex, rIndex) => {
          const copia = [...respuestas];
          copia[pIndex] = rIndex;
          setRespuestas(copia);
        };

        const corregirTest = () => {
          window.ErrorLab.recordFailures(SUBJECT_NAME, preguntasMostradas, respuestas);
          setCorregido(true);
        };

        const reiniciar = () => {
          const nuevoTest = obtenerTestAleatorio();
          setPreguntasMostradas(nuevoTest);
          setRespuestas(Array(nuevoTest.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link back-link-final" title="Aquí se vuelve al portal Pilar">
                  <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                </a>
              </div>
              <section className="hero" style={{ padding: "28px 24px" }}>
                <span className="badge">🧠 ITPE Repaso 1 de Mayo</span>
                <h1 className="test-title">ITPE Repaso 1 de Mayo</h1>
                <p className="lead">
                  Test interactivo autocorregible con 30 preguntas aleatorias
                  por intento, generado a partir del banco que me pasaste en
                  PDF.
                </p>
                <p
                  className="lead"
                  style={{ marginTop: "10px", fontSize: "0.98rem" }}
                >
                  Sistema de puntuación: correcta +0,33, incorrecta -0,11, en
                  blanco 0.
                </p>
                <div className="stats">
                  <div className="stat">
                    <b>{preguntasMostradas.length}</b>Preguntas
                  </div>
                  <div className="stat">
                    <b>{respondidas}</b>Respondidas
                  </div>
                  <div className="stat">
                    <b>{corregido ? puntaje : "—"}</b>Puntos
                  </div>
                </div>
              </section>

              <div style={{ height: "18px" }} />

              {preguntasMostradas.map((p, i) => (
                <div key={i} className="card">
                  <h2 className="question-title">
                    {i + 1}. {p.enunciado}
                  </h2>
                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;
                    let clases = "answer-btn";
                    if (seleccionado) clases += " answer-selected";
                    if (corregido && respuestas[i] !== null && seleccionado && !esCorrecta)
                      clases += " answer-wrong";
                    if (corregido && respuestas[i] !== null && esCorrecta) clases += " answer-correct";
                    return (
                      <button
                        key={j}
                        onClick={() => seleccionar(i, j)}
                        className={clases}
                      >
                        {"ABCD"[j]}) {op}
                      </button>
                    );
                  })}
                </div>
              ))}

              <div className="result-section">
                <div className="actions">
                  <a
                    href="../index.html"
                    className="back-link back-link-final"
                    title="Aquí se vuelve al portal Pilar"
                  >
                    <span className="neon-arrow">←</span> Aquí se vuelve al
                    portal Pilar
                  </a>
                  <button
                    className="btn-correct"
                    onClick={corregirTest}
                  >
                    Corregir test
                  </button>
                  <button className="btn-reset" onClick={reiniciar}>
                    Reiniciar
                  </button>
                </div>

                {corregido && (
                  <>
                    <p className="result-text">Puntuación: {puntaje} puntos</p>
                    <p className="result-sub">
                      {aciertos} correctas, {fallos} incorrectas y {enBlanco} en
                      blanco.
                    </p>
                    <div className="progress">
                      <span style={{ width: `${porcentaje}%` }}></span>
                    </div>
                  </>
                )}
              </div>

              <footer>
                Banco PDF transformado a test interactivo y listo para
                practicar.
              </footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <TestInteractivo />,

</html>
