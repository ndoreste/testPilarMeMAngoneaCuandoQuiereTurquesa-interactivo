<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulacro · Asignatura</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <script src="../assets/exam-day-data.js"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/favicons/portal.svg" />
    <style>
      .exam-shell { max-width: 1100px; margin: 0 auto; }
      .timer-chip { display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:16px; border:1px solid rgba(239,68,68,0.28); background: rgba(239,68,68,0.08); color:#ffd4d9; font-weight:800; }
      .timer-chip strong { font-size:1.15rem; letter-spacing:0.06em; }
      .exam-topline { display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:18px; }
      .exam-pill { display:inline-flex; padding:8px 12px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background: rgba(255,255,255,0.04); }
      .exam-nav { display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
      .exam-summary-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-top: 18px; }
      .exam-summary-card { padding:16px; border-radius:18px; border:1px solid var(--line); background: rgba(255,255,255,0.04); }
      .exam-summary-card b { display:block; font-size:1.2rem; color:var(--text); }
      .exam-summary-card span { color:var(--muted); font-size:0.9rem; display:block; margin-top:6px; }
      .modal-backdrop { position: fixed; inset: 0; background: rgba(4,8,20,0.72); backdrop-filter: blur(8px); display:flex; align-items:center; justify-content:center; z-index:99999; padding:20px; }
      .modal-card { width:min(460px,100%); padding:24px; border-radius:24px; border:1px solid rgba(239,68,68,0.28); background: linear-gradient(135deg, rgba(34,12,22,0.96), rgba(14,22,44,0.98)); box-shadow: var(--shadow); text-align:center; }
      .modal-card h3 { margin:0 0 8px; font-size:1.6rem; color:#fff; }
      .modal-card p { margin:0 0 18px; color:#d4dceb; line-height:1.6; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const STORAGE_KEY = 'openclaw_exam_day_sim_pilar_v1';
      const EXAM_SECONDS = 3600;
      const params = new URLSearchParams(window.location.search);
      const subjectKey = params.get('subject');
      function loadState() { try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : { modules: [] }; } catch { return { modules: [] }; } }
      function saveState(state) { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
      function formatTime(total) { const safe = Math.max(0, total); const hours = String(Math.floor(safe / 3600)).padStart(2, '0'); const mins = String(Math.floor((safe % 3600) / 60)).padStart(2, '0'); const secs = String(safe % 60).padStart(2, '0'); return `${hours}:${mins}:${secs}`; }
      function calculateScore(questions, answers) { const respondidas = answers.filter((r) => r !== null).length; const aciertos = answers.reduce((acc, r, i) => r !== null && r === questions[i]?.correcta ? acc + 1 : acc, 0); const fallos = answers.reduce((acc, r, i) => r !== null && r !== questions[i]?.correcta ? acc + 1 : acc, 0); const enBlanco = questions.length - respondidas; const puntaje = Number(((aciertos * 0.33) - (fallos * 0.11)).toFixed(2)); const maximo = Number((questions.length * 0.33).toFixed(2)); const nota10 = maximo > 0 ? Number(Math.max(0, ((puntaje / maximo) * 10)).toFixed(2)) : 0; return { aciertos, fallos, enBlanco, puntaje, maximo, nota10 }; }
      function nextUnlock(modules, idx) { if (idx + 1 < modules.length && modules[idx + 1].status === 'locked') modules[idx + 1].status = 'ready'; }
      function App() {
        const [state, setState] = React.useState(() => loadState());
        const [remaining, setRemaining] = React.useState(EXAM_SECONDS);
        const [showTimeout, setShowTimeout] = React.useState(false);
        const moduleIndex = state.modules.findIndex(m => m.key === subjectKey);
        const current = moduleIndex >= 0 ? state.modules[moduleIndex] : null;
        React.useEffect(() => {
          if (!current || current.status !== 'in_progress' || !current.deadline) return;
          const tick = () => {
            const left = Math.max(0, Math.floor((current.deadline - Date.now()) / 1000));
            setRemaining(left);
            if (left === 0) {
              setState(prev => {
                const next = JSON.parse(JSON.stringify(prev));
                const mod = next.modules[moduleIndex];
                if (!mod || mod.status !== 'in_progress') return prev;
                mod.status = 'timed_out';
                mod.completedAt = Date.now();
                mod.result = calculateScore(mod.questions, mod.answers);
                nextUnlock(next.modules, moduleIndex);
                saveState(next);
                return next;
              });
              setShowTimeout(true);
            }
          };
          tick();
          const id = setInterval(tick, 1000);
          return () => clearInterval(id);
        }, [subjectKey, current?.deadline, current?.status]);
        React.useEffect(() => { if (!current || current.status !== 'in_progress' || !current.deadline) setRemaining(EXAM_SECONDS); }, [current?.status, current?.deadline]);
        if (!current) return <div className="page-shell"><p>No se ha encontrado la asignatura del simulacro.</p></div>;
        const done = current.status === 'completed' || current.status === 'timed_out';
        const liveResult = calculateScore(current.questions || [], current.answers || []);
        const result = current.result || liveResult;
        const selectAnswer = (qIndex, answerIndex) => {
          setState(prev => {
            const next = JSON.parse(JSON.stringify(prev));
            const mod = next.modules[moduleIndex];
            if (!mod || mod.status !== 'in_progress') return prev;
            mod.answers[qIndex] = answerIndex;
            saveState(next);
            return next;
          });
        };
        const finish = () => {
          setState(prev => {
            const next = JSON.parse(JSON.stringify(prev));
            const mod = next.modules[moduleIndex];
            if (!mod || mod.status !== 'in_progress') return prev;
            mod.status = 'completed';
            mod.completedAt = Date.now();
            mod.result = calculateScore(mod.questions, mod.answers);
            nextUnlock(next.modules, moduleIndex);
            saveState(next);
            return next;
          });
        };
        const back = () => { window.location.href = './index.html'; };
        return (
          <div className="page-shell exam-shell">
            <div className="topbar"><a href="./index.html" className="back-link back-link-final" title="Volver al simulacro"><span className="neon-arrow">←</span> Volver al simulacro</a></div>
            <section className="hero" style={{ padding: '28px 24px' }}>
              <span className="badge">{current.code} · Simulacro día del eaxamen</span>
              <h1 className="test-title">{current.title}</h1>
              <p className="lead">Esta asignatura se realiza como examen independiente dentro del simulacro global.</p>
            </section>
            <div style={{ height: '18px' }} />
            {!done ? (
              <div className="test-container">
                <div className="exam-topline"><div><span className="badge">{current.questions.length} preguntas</span></div><div className="timer-chip"><span>⏳</span><strong>{formatTime(remaining)}</strong></div></div>
                <div className="exam-nav" style={{ marginBottom: '18px' }}>
                  <span className="exam-pill">{current.answers.filter(x => x !== null).length} respondidas</span>
                  <span className="exam-pill">Puntuación en vivo: {liveResult.puntaje.toFixed(2)}</span>
                </div>
                {current.questions.map((q, i) => (
                  <div key={i} className="card" style={{ marginBottom: '18px' }}>
                    <h2 className="question-title">{i + 1}. {q.enunciado}</h2>
                    {q.opciones.map((op, j) => { const selected = current.answers[i] === j; let cls = 'answer-btn'; if (selected) cls += ' answer-selected'; return <button key={j} className={cls} onClick={() => selectAnswer(i, j)}>{op}</button>; })}
                  </div>
                ))}
                <div className="result-section"><div className="actions"><button className="btn-correct" onClick={finish}>Finalizar asignatura</button></div></div>
              </div>
            ) : (
              <div className="test-container">
                <div className="card" style={{ marginBottom: '18px' }}>
                  <h2 className="question-title">Resultado del examen</h2>
                  <p className="lead" style={{ textAlign:'left', maxWidth:'100%' }}>Has terminado {current.title}.</p>
                  <div className="exam-summary-grid">
                    <div className="exam-summary-card"><b>{result.puntaje.toFixed(2)}</b><span>Puntuación obtenida</span></div>
                    <div className="exam-summary-card"><b>{result.nota10.toFixed(2)} / 10</b><span>Nota del examen</span></div>
                    <div className="exam-summary-card"><b>{result.aciertos}</b><span>Correctas</span></div>
                    <div className="exam-summary-card"><b>{result.fallos}</b><span>Incorrectas</span></div>
                    <div className="exam-summary-card"><b>{result.enBlanco}</b><span>En blanco</span></div>
                  </div>
                </div>
                <div className="result-section"><div className="actions"><button className="btn-reset" onClick={back}>Volver al simulacro</button></div></div>
              </div>
            )}
            {showTimeout ? <div className="modal-backdrop"><div className="modal-card"><h3>Tiempo agotado</h3><p>Se ha terminado la hora de esta asignatura. Ya no puedes seguir respondiendo este examen.</p><button className="btn-correct" onClick={back}>Volver al simulacro</button></div></div> : null}
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
