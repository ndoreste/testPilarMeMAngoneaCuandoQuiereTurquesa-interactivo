<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Laboratorio de errores · Test Interactivo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" type="image/svg+xml" href="../assets/favicons/laboratorio-errores.svg" />
    <script src="../assets/error-lab.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const TOTAL_PREGUNTAS = 30;
      function mezclarArray(array) {
        const copia = [...array];
        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
      }
      function TestErrores() {
        const [bancoErrores, setBancoErrores] = React.useState(() => window.ErrorLab.getQuestions());
        const [preguntasMostradas, setPreguntasMostradas] = React.useState([]);
        const [respuestas, setRespuestas] = React.useState([]);
        const [corregido, setCorregido] = React.useState(false);
        React.useEffect(() => {
          const banco = window.ErrorLab.getQuestions();
          setBancoErrores(banco);
          const nuevo = mezclarArray(banco).slice(0, Math.min(TOTAL_PREGUNTAS, banco.length));
          setPreguntasMostradas(nuevo);
          setRespuestas(Array(nuevo.length).fill(null));
          setCorregido(false);
        }, []);
        const respondidas = respuestas.filter((r) => r !== null).length;
        const aciertos = respuestas.reduce((acc, r, i) => r !== null && r === preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const fallos = respuestas.reduce((acc, r, i) => r !== null && r !== preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const enBlanco = preguntasMostradas.length - respondidas;
        const puntaje = ((aciertos * 0.33) - (fallos * 0.11)).toFixed(2);
        const puntuacionMaxima = preguntasMostradas.length * 0.33;
        const porcentaje = puntuacionMaxima ? Math.max(0, Math.round((Number(puntaje) / puntuacionMaxima) * 100)) : 0;
        const seleccionar = (pIndex, rIndex) => {
          const copia = [...respuestas];
          copia[pIndex] = copia[pIndex] === rIndex ? null : rIndex;
          setRespuestas(copia);
        };
        const reiniciar = () => {
          const banco = window.ErrorLab.getQuestions();
          setBancoErrores(banco);
          const nuevo = mezclarArray(banco).slice(0, Math.min(TOTAL_PREGUNTAS, banco.length));
          setPreguntasMostradas(nuevo);
          setRespuestas(Array(nuevo.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };
        if (!bancoErrores.length) {
          return <div className="page-shell"><div className="test-container"><div className="topbar"><a href="../index.html" className="back-link back-link-final" title="Aquí se vuelve al portal Pilar"><span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar</a></div><section className="hero" style={{ padding: "28px 24px" }}><span className="badge">⚗️ Laboratorio de errores</span><h1 className="test-title">Laboratorio de errores</h1><p className="lead">Aquí aparecerán automáticamente las preguntas que vayas fallando en tus tests.</p><p className="lead" style={{ marginTop: "10px", fontSize: "0.98rem" }}>Todavía no has acumulado errores guardados.</p></section></div></div>;
        }
        return <div className="page-shell"><div className="test-container"><div className="topbar"><a href="../index.html" className="back-link back-link-final" title="Aquí se vuelve al portal Pilar"><span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar</a></div><section className="hero" style={{ padding: "28px 24px" }}><span className="badge">⚗️ Laboratorio de errores</span><h1 className="test-title">Laboratorio de errores</h1><p className="lead">Test automático creado solo con preguntas que has fallado antes, mezcladas entre todas las asignaturas.</p><p className="lead" style={{ marginTop: "10px", fontSize: "0.98rem" }}>Sistema de puntuación: correcta +0,33, incorrecta -0,11, en blanco 0.</p><div className="stats"><div className="stat"><b>{preguntasMostradas.length}</b>Preguntas</div><div className="stat"><b>{respondidas}</b>Respondidas</div><div className="stat"><b>{corregido ? puntaje : "—"}</b>Puntos</div></div></section><div style={{ height: "18px" }} />{preguntasMostradas.map((p, i) => (<div key={i} className={`card${corregido && respuestas[i] === null ? " card-blank" : ""}`}><h2 className="question-title">{i + 1}. {p.enunciado}</h2><p className="result-sub" style={{ marginBottom: "12px" }}>Asignatura: {p.subject || "General"}</p>{p.opciones.map((op, j) => {const seleccionado = respuestas[i] === j; const esCorrecta = p.correcta === j; let clases = "answer-btn"; if (seleccionado) clases += " answer-selected"; if (corregido && respuestas[i] !== null && seleccionado && !esCorrecta) clases += " answer-wrong"; if (corregido && respuestas[i] !== null && esCorrecta) clases += " answer-correct"; return <button key={j} onClick={() => seleccionar(i, j)} className={clases}>{op}</button>;})}</div>))}<div className="result-section"><div className="actions"><a href="../index.html" className="back-link back-link-final" title="Aquí se vuelve al portal Pilar"><span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar</a><button className="btn-correct" onClick={() => setCorregido(true)}>Corregir test</button><button className="btn-reset" onClick={reiniciar}>Reiniciar</button></div>{corregido && (<><p className="result-text">Puntuación: {puntaje} puntos</p><p className="result-sub">{aciertos} correctas, {fallos} incorrectas y {enBlanco} en blanco.</p><div className="progress"><span style={{ width: `${porcentaje}%` }}></span></div></>)}</div><footer>Este test se alimenta automáticamente con tus errores guardados en el navegador.</footer></div></div>;
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<TestErrores />);
    </script>
  </body>
</html>
