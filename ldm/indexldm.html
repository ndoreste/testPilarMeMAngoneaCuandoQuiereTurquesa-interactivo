      const TOTAL_PREGUNTAS = Math.min(30, preguntas.length);

      function mezclarArray(lista) {
        const copia = [...lista];
        for (let i = copia.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copia[i], copia[j]] = [copia[j], copia[i]];
        }
        return copia;
      }

      function obtenerTestAleatorio() {
        return mezclarArray(preguntas).slice(0, TOTAL_PREGUNTAS);
      }

      function TestInteractivo() {
        const [preguntasMostradas, setPreguntasMostradas] = React.useState(() => obtenerTestAleatorio());
        const [respuestas, setRespuestas] = React.useState(() => Array(TOTAL_PREGUNTAS).fill(null));
        const [corregido, setCorregido] = React.useState(false);
        const respondidas = respuestas.filter((r) => r !== null).length;
        const puntaje = respuestas.reduce((acc, r, i) => r === preguntasMostradas[i]?.correcta ? acc + 1 : acc, 0);
        const porcentaje = preguntasMostradas.length ? Math.round((puntaje / preguntasMostradas.length) * 100) : 0;
        const seleccionar = (pIndex, rIndex) => {
          const copia = [...respuestas];
          copia[pIndex] = rIndex;
          setRespuestas(copia);
        };
        const reiniciar = () => {
          const nuevoTest = obtenerTestAleatorio();
          setPreguntasMostradas(nuevoTest);
          setRespuestas(Array(nuevoTest.length).fill(null));
          setCorregido(false);
          window.scrollTo({top:0, behavior:'smooth'});
        };
        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../index.html" className="back-link">← Volver al portal</a>
              </div>
              <section className="hero" style={{padding:'28px 24px'}}>
                <span className="badge">🌐 Lenguaje de Marcas</span>
                <h1 className="test-title">Lenguaje de Marcas</h1>
                <p className="lead">Test interactivo autocorregible con 30 preguntas aleatorias por intento. Al reiniciar, el sistema vuelve a barajar y genera un test distinto.</p>
                <div className="stats">
                  <div className="stat"><b>{preguntasMostradas.length}</b>Preguntas</div>
                  <div className="stat"><b>{respondidas}</b>Respondidas</div>
                  <div className="stat"><b>{corregido ? puntaje : '—'}</b>Aciertos</div>
                </div>
              </section>
              <div style={{height:'18px'}} />
              {preguntasMostradas.map((p, i) => (
                <div key={i} className="card">
                  <h2 className="question-title">{i + 1}. {p.enunciado}</h2>
                  {p.opciones.map((op, j) => {
                    const seleccionado = respuestas[i] === j;
                    const esCorrecta = p.correcta === j;
                    let clases = 'answer-btn';
                    if (seleccionado) clases += ' answer-selected';
                    if (corregido && seleccionado && !esCorrecta) clases += ' answer-wrong';
                    if (corregido && esCorrecta) clases += ' answer-correct';
                    return (
                      <button key={j} onClick={() => seleccionar(i, j)} className={clases}>
                        {op}
                      </button>
                    );
                  })}
                </div>
              ))}
              <div className="result-section">
                <div className="actions">
                  <button className="btn-correct" onClick={() => setCorregido(true)}>Corregir test</button>
                  <button className="btn-reset" onClick={reiniciar}>Reiniciar</button>
                </div>
                {corregido && (
                  <>
                    <p className="result-text">Resultado: {puntaje} / {preguntasMostradas.length} ({porcentaje}%)</p>
                    <p className="result-sub">Has respondido {respondidas} de {preguntasMostradas.length} preguntas.</p>
                    <div className="progress"><span style={{width: `${porcentaje}%`}}></span></div>
                  </>
                )}
              </div>
              <footer>Creado a partir de tus preguntas y preparado para publicación en GitHub Pages.</footer>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById('root')).render(<TestInteractivo />);
    </script>
