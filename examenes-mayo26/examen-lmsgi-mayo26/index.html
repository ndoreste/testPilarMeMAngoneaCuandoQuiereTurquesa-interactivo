  },
  {

    "opciones": [

  },
  {
    "enunciado": "¿Qué regla de diseño se destaca como fundamental en el desarrollo web?",

    ],
    "correcta": 0
  },
  {
    "enunciado": "¿Qué selector CSS aplica estilo a un enlace SOLO cuando el puntero está encima?",
    "opciones": [
      "a:active",
      "a:visited",
      "a:link",
      "a:hover"
    ],
    "correcta": 3
  },
  {
    "enunciado": "¿Qué formato se recomienda como habitual para colores en CSS?",
    "opciones": [
      "Nombres de color (red, blue...)",

  {

  {

    "opciones": [

    "correcta": 3
  },
  {
    "enunciado": "¿Qué valor de visibility oculta un elemento pero manteniendo su espacio en el layout?",
    "opciones": [

    ],
    "correcta": 0
  },
  {
    "enunciado": "¿Qué regla de media query apunta a pantallas con ancho máximo de 768px?",
    "opciones": [
      "@media screen and (max-width: 768px)",

      "@media all and (min-height: 768px)"
    ],
    "correcta": 0
  },
  {
    "enunciado": "La propiedad abreviada gap en CSS Grid...",
    "opciones": [
      "Puede establecer row-gap y column-gap (en ese orden)",

  {

  },
  {

    "opciones": [

  },
  {

  {

    "opciones": [
      "Con comillas dobles o simples",

    "correcta": 0
  },
  {

  {

  {

  {

  {

  {

    "opciones": [
      "let nombre = \"Ana\";",
      "const nombre = \"Ana\";",
      "define nombre = \"Ana\";",
      "var: nombre = \"Ana\";"
    ],
    "correcta": 0
  },
  {
    "enunciado": "En JavaScript, ¿qué resultado devuelve console.log(\"5\" - 2)?",
    "opciones": [
      "\"52\"",
      "\"3\"",
      "52",
      "3"
    ],
    "correcta": 3
  }
];
      const SUBJECT_NAME = "LMSGI Examen Mayo 26";

      function TestInteractivo() {
        const [respuestas, setRespuestas] = React.useState(() => Array(preguntas.length).fill(null));
        const [corregido, setCorregido]   = React.useState(false);

        const respondidas = respuestas.filter(r => r !== null).length;
        const aciertos = respuestas.reduce((acc,r,i) => r!==null && r===preguntas[i]?.correcta ? acc+1 : acc, 0);
        const fallos   = respuestas.reduce((acc,r,i) => r!==null && r!==preguntas[i]?.correcta ? acc+1 : acc, 0);
        const enBlanco = preguntas.length - respondidas;
        const puntaje  = ((aciertos*0.33)-(fallos*0.11)).toFixed(2);
        const puntuacionMaxima = preguntas.length * 0.33;
        const porcentaje = puntuacionMaxima ? Math.max(0,Math.round((Number(puntaje)/puntuacionMaxima)*100)) : 0;

        const seleccionar = (pIndex, rIndex) => {
          if (corregido) return;
          const copia = [...respuestas];
          copia[pIndex] = copia[pIndex] === rIndex ? null : rIndex;
          setRespuestas(copia);
        };

        const corregirTest = () => {
          window.ErrorLab.recordFailures(SUBJECT_NAME, preguntas, respuestas);
          setCorregido(true);
        };

        const reiniciar = () => {
          setRespuestas(Array(preguntas.length).fill(null));
          setCorregido(false);
          window.scrollTo({ top: 0, behavior: "smooth" });
        };

        return (
          <div className="page-shell">
            <div className="test-container">
              <div className="topbar">
                <a href="../../index.html" className="back-link back-link-final" title="Aquí se vuelve al portal Pilar">
                  <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                </a>
              </div>
              <section className="hero" style={{ padding: "28px 24px" }}>
                <span className="badge">🌐 Lenguajes de Marcas</span>
                <h1 className="test-title">LMSGI · Examen Mayo 2026</h1>
                <p className="lead">30 preguntas del examen oficial de Lenguajes de Marcas de mayo 2026.</p>
                <p className="lead" style={{ marginTop:"10px", fontSize:"0.95rem" }}>
                  Puntuación: correcta +0,33 · incorrecta −0,11 · en blanco 0.
                </p>
                <div className="stats">
                  <div className="stat"><b>{preguntas.length}</b>Preguntas</div>
                  <div className="stat"><b>{respondidas}</b>Respondidas</div>
                  <div className="stat"><b>{corregido ? puntaje : "—"}</b>Puntos</div>
                </div>
              </section>
              <div style={{ height:"18px" }} />
              {preguntas.map((p,i) => (
                <div key={i} className={`card${corregido && respuestas[i]===null ? " card-blank" : ""}`}>
                  <h2 className="question-title">{i+1}. {p.enunciado}</h2>
                  {p.opciones.map((op,j) => {
                    const sel = respuestas[i]===j;
                    const ok  = p.correcta===j;
                    let cl = "answer-btn";
                    if (sel) cl += " answer-selected";
                    if (corregido && sel && !ok) cl += " answer-wrong";
                    if (corregido && ok)         cl += " answer-correct";
                    return <button key={j} onClick={()=>seleccionar(i,j)} className={cl}>
                      {"ABCD"[j]}) {op}
                    </button>;
                  })}
                </div>
              ))}
              <div className="result-section">
                <div className="actions">
                  <a href="../../index.html" className="back-link back-link-final" title="Aquí se vuelve al portal Pilar">
                    <span className="neon-arrow">←</span> Aquí se vuelve al portal Pilar
                  </a>
                  <button className="btn-correct" onClick={corregirTest}>Corregir test</button>
                  <button className="btn-reset"   onClick={reiniciar}>Reiniciar</button>
                </div>
                {corregido && (
                  <>
                    <p className="result-text">Puntuación: {puntaje} puntos</p>
                    <p className="result-sub">{aciertos} correctas · {fallos} incorrectas · {enBlanco} en blanco</p>
                    <div className="progress"><span style={{ width:`${porcentaje}%` }}></span></div>
                  </>
                )}
              </div>
              <footer>LMSGI · Examen Mayo 2026 · Examen Mayo 2026 · 1º ASIR</footer>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<TestInteractivo />);
    </script>
  </body>
</html>
